<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix.com</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="wrapper">  
        <div class="header">
            <div class="logo">
                <img src="assets/netflixlogo.jpg" alt="netflix logo" 
                style="height: 35px; height: 35px; padding-left: 50px;"></div>
            <div class="signup">
                 <button class="button" style=" 
                    background-color: red; 
                    color: white;
                     border:0px; border-radius: 5px;
                     width: 80px;height: 25px;
                     margin-right: 50px;">Sign Up</button></div>
        </div>
        <div class="hero"> 
            <h1 style="font-family: serif;">Unlimited movies, TV shows, and more</h1>
            <h3 
            style="font-family: Arial, Helvetica, sans-serif;">Watch anywhere. Cancel anytime. From as low as 200KSH</h3>
            <p 
            style="font-family: Arial, Helvetica, sans-serif;display: flex; flex-wrap: nowrap;">Ready to watch? Enter your email to create or restart your membership.</p>
        </div> 
        <div class="nav">
            <input type="email" placeholder="Email address" style="width: 300px;
             height: 45px; 
             border-radius: 5px;
              border:1px; border-color: white;
              border-style: solid;
             padding-left:2px;
             background-color: transparent;
             color: white;
             opacity: 100;">
            <button class="button" style=" 
                    background-color: red; 
                    color: white;
                     border:0px; border-radius: 5px;
                     width: 100px;height: 45px;">Get Started ></button>
        </div>     

    </div>
    
</body>
</html>
