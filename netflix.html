<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="container" id="c1">
            <h1 style="font-size: 35px; 
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">
            Who is watching?</h1>
        </div>
        <div class="container" id="c2">
            <div class="profile">
                <div id="p1">
                    <img src="assets/user.jpg" alt="profile1" style="width: 120px; height: 120px;">
                    <p style="opacity: 0.8;">Profile 1</p>
                </div>
            </div>
            <div class="profile">
                <div id="p2">
                    <img src="assets/guest.png" alt="guest" style="width: 120px; height: 120px;">
                    <p style="opacity: 0.8;">Guest</p>
                </div>
            </div>
            <div class="profile">
                <div id="p3">
                    <img src="assets/addprofile.png" alt="addprofile" style="width: 120px; height: 120px;">
                    <p style="opacity: 0.8;">Add Profile</p>
                </div>
            </div>
        </div>
        <div class="container" id="c3">
            <button class="manage-profiles" style="width: 150px;
             height: 50px;
              background-color:transparent;
               color: white; border: 1px solid white; 
               border-radius: 5px; 
               font-size: 16px; 
               cursor: pointer;
               opacity: 0.8;"               
               > manage profiles
               </button>
        </div>
    </div>
                </div>
            </div>           
    </div>

    
</body>
</html>
