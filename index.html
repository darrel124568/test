<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .results {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .result-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-left: 4px solid #667eea;
        }
        .result-label {
            font-weight: bold;
            color: #667eea;
        }
        .result-value {
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ Temperature Converter</h1>
        
        <div class="input-group">
            <label for="celsius">Celsius (°C)</label>
            <input type="number" id="celsius" placeholder="Enter temperature" oninput="convertTemperature('celsius')">
        </div>

        <div class="input-group">
            <label for="fahrenheit">Fahrenheit (°F)</label>
            <input type="number" id="fahrenheit" placeholder="Enter temperature" oninput="convertTemperature('fahrenheit')">
        </div>

        <div class="input-group">
            <label for="kelvin">Kelvin (K)</label>
            <input type="number" id="kelvin" placeholder="Enter temperature" oninput="convertTemperature('kelvin')">
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        function convertTemperature(unit) {
            const celsiusInput = document.getElementById('celsius');
            const fahrenheitInput = document.getElementById('fahrenheit');
            const kelvinInput = document.getElementById('kelvin');
            const resultsDiv = document.getElementById('results');

            let celsius, fahrenheit, kelvin;

            if (unit === 'celsius') {
                celsius = parseFloat(celsiusInput.value);
                if (isNaN(celsius)) return;
                fahrenheit = (celsius * 9/5) + 32;
                kelvin = celsius + 273.15;
            } else if (unit === 'fahrenheit') {
                fahrenheit = parseFloat(fahrenheitInput.value);
                if (isNaN(fahrenheit)) return;
                celsius = (fahrenheit - 32) * 5/9;
                kelvin = celsius + 273.15;
            } else if (unit === 'kelvin') {
                kelvin = parseFloat(kelvinInput.value);
                if (isNaN(kelvin)) return;
                celsius = kelvin - 273.15;
                fahrenheit = (celsius * 9/5) + 32;
            }

            celsiusInput.value = celsius.toFixed(2);
            fahrenheitInput.value = fahrenheit.toFixed(2);
            kelvinInput.value = kelvin.toFixed(2);

            resultsDiv.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Celsius:</span>
                    <span class="result-value">${celsius.toFixed(2)} °C</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Fahrenheit:</span>
                    <span class="result-value">${fahrenheit.toFixed(2)} °F</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Kelvin:</span>
                    <span class="result-value">${kelvin.toFixed(2)} K</span>
                </div>
            `;
        }
    </script>
</body>
</html>
